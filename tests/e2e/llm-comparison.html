<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Engine Comparison - WebLLM vs Transformers.js</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      min-height: 100vh;
    }
    h1 { color: #00d4ff; text-align: center; font-size: 2em; margin-bottom: 5px; }
    .subtitle { text-align: center; color: #888; margin-bottom: 20px; font-size: 14px; }
    
    .hardware-info {
      background: #2d2d44;
      padding: 12px 20px;
      border-radius: 10px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 10px;
    }
    .hw-item { text-align: center; }
    .hw-label { color: #888; font-size: 11px; }
    .hw-value { color: #00d4ff; font-weight: bold; font-size: 13px; }
    
    .controls {
      background: #2d2d44;
      padding: 15px 20px;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    .controls-row {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 10px;
    }
    .controls-row:last-child { margin-bottom: 0; }
    .controls label { color: #888; font-size: 12px; }
    .controls select, .controls input {
      background: #1a1a2e;
      border: 1px solid #3d3d5c;
      color: #eee;
      padding: 8px 12px;
      border-radius: 5px;
      font-size: 13px;
    }
    .controls select { min-width: 300px; }
    button {
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      border: none;
      color: #000;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { transform: scale(1.02); }
    button:disabled { background: #3d3d5c; color: #888; cursor: not-allowed; transform: none; }
    
    .model-info {
      background: #1d3d4d;
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 12px;
      color: #88ccff;
    }
    .model-info .tag {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      margin-left: 5px;
    }
    .tag.webllm { background: #4d1d6d; color: #cc88ff; }
    .tag.transformers { background: #1d4d6d; color: #88ccff; }
    .tag.both { background: #1d4d3d; color: #88ffcc; }
    
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
      margin: 15px 0;
    }
    .result-card {
      background: #2d2d44;
      border-radius: 12px;
      padding: 15px;
      position: relative;
    }
    .result-card.winner {
      border: 2px solid #00ff88;
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
    }
    .result-card.winner::before {
      content: '🏆 FASTEST';
      position: absolute;
      top: 8px;
      right: 8px;
      background: #00ff88;
      color: #000;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: bold;
    }
    .result-card h3 { margin: 0 0 10px 0; font-size: 13px; }
    .result-card .icon { font-size: 18px; }
    .result-card .engine { color: #00d4ff; }
    .result-card .backend { color: #888; font-size: 11px; display: block; }
    
    .metric {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #3d3d5c;
      font-size: 12px;
    }
    .metric:last-child { border-bottom: none; }
    .metric-label { color: #888; }
    .metric-value { color: #00d4ff; font-weight: bold; }
    .metric-value.highlight { color: #00ff88; font-size: 18px; }
    
    .status { padding: 5px 10px; border-radius: 15px; font-size: 10px; }
    .status.loading { background: #4d4d1d; color: #ffcc00; }
    .status.success { background: #1d4d3d; color: #00ff88; }
    .status.error { background: #4d1d2d; color: #ff6b6b; }
    .status.pending { background: #2d2d44; color: #888; }
    
    .summary {
      background: linear-gradient(135deg, #1d4d3d, #2d5d4d);
      padding: 20px;
      border-radius: 12px;
      margin: 15px 0;
      text-align: center;
    }
    .summary h2 { margin: 0 0 10px 0; color: #00ff88; font-size: 16px; }
    .summary-stats { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
    .summary-stat { text-align: center; }
    .summary-stat .value { font-size: 28px; font-weight: bold; color: #00d4ff; }
    .summary-stat .label { color: #aaa; font-size: 11px; }
    
    #output {
      background: #16162c;
      padding: 12px;
      border-radius: 8px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 11px;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
      margin-top: 15px;
    }
    
    .progress-bar {
      height: 3px;
      background: #3d3d5c;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #00ff88);
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <h1>🚀 LLM Engine Comparison</h1>
  <p class="subtitle">WebLLM vs Transformers.js • Same Model, Fair Comparison</p>
  
  <div class="hardware-info" id="hardware">
    <div class="hw-item">
      <div class="hw-label">GPU</div>
      <div class="hw-value" id="hw-gpu">Detecting...</div>
    </div>
    <div class="hw-item">
      <div class="hw-label">WebGPU</div>
      <div class="hw-value" id="hw-webgpu">Detecting...</div>
    </div>
    <div class="hw-item">
      <div class="hw-label">CPU Cores</div>
      <div class="hw-value" id="hw-cpu">-</div>
    </div>
  </div>
  
  <div class="controls">
    <div class="controls-row">
      <div>
        <label>Model:</label>
        <select id="modelSelect">
          <optgroup label="🔥 Qwen 3 (Latest 2025)">
            <option value="qwen3-0.6b">Qwen 3 0.6B (WebLLM only)</option>
            <option value="qwen3-1.7b">Qwen 3 1.7B (WebLLM only)</option>
            <option value="qwen3-4b">Qwen 3 4B (WebLLM only)</option>
          </optgroup>
          <optgroup label="💎 Gemma 3 (Google 2025)">
            <option value="gemma3-1b" selected>Gemma 3 1B Instruct</option>
            <option value="gemma3-4b">Gemma 3 4B Instruct (WebLLM only)</option>
          </optgroup>
          <optgroup label="🦙 Llama 3.2 (Meta)">
            <option value="llama-3.2-1b">Llama 3.2 1B Instruct</option>
            <option value="llama-3.2-3b">Llama 3.2 3B Instruct (WebLLM only)</option>
          </optgroup>
          <optgroup label="⚡ Small & Fast">
            <option value="smollm2-360m">SmolLM2 360M Instruct</option>
            <option value="qwen-2.5-0.5b">Qwen 2.5 0.5B Instruct</option>
          </optgroup>
          <optgroup label="🧠 Medium (3-4B)">
            <option value="phi-3.5">Phi 3.5 Mini 3.8B (WebLLM only)</option>
          </optgroup>
        </select>
      </div>
      <div>
        <label>Iterations:</label>
        <input type="number" id="iterations" value="3" min="1" max="10" style="width:50px">
      </div>
      <div>
        <label>Max Tokens:</label>
        <input type="number" id="maxTokens" value="50" min="10" max="100" style="width:60px">
      </div>
      <button id="runBtn" onclick="runComparison()">▶️ Run Comparison</button>
      <span id="globalStatus" class="status pending">Ready</span>
    </div>
    <div class="model-info" id="modelInfo">
      Selected: <strong>Gemma 3 1B Instruct</strong> 
      <span class="tag both">Both Engines</span>
    </div>
  </div>
  
  <div class="results-grid" id="results"></div>
  
  <div class="summary" id="summary" style="display:none;">
    <h2>🏆 Results</h2>
    <div class="summary-stats" id="summaryStats"></div>
  </div>
  
  <details>
    <summary style="cursor:pointer;color:#888;font-size:12px;margin-top:15px;">📋 Log</summary>
    <div id="output">Ready...</div>
  </details>

  <script type="module">
    const output = document.getElementById('output');
    const resultsGrid = document.getElementById('results');
    const summaryDiv = document.getElementById('summary');
    const globalStatus = document.getElementById('globalStatus');
    const modelSelect = document.getElementById('modelSelect');
    const modelInfo = document.getElementById('modelInfo');
    
    // Model configurations
    // WebLLM: MLC-compiled (q4f16), Transformers.js: ONNX (q4)
    const MODELS = {
      // Qwen 3 (2025) - WebLLM only for now
      'qwen3-0.6b': {
        name: 'Qwen 3 0.6B',
        webllm: 'Qwen3-0.6B-q4f16_1-MLC',
        transformers: null,
        availability: 'webllm',
      },
      'qwen3-1.7b': {
        name: 'Qwen 3 1.7B',
        webllm: 'Qwen3-1.7B-q4f16_1-MLC',
        transformers: null,
        availability: 'webllm',
      },
      'qwen3-4b': {
        name: 'Qwen 3 4B',
        webllm: 'Qwen3-4B-q4f16_1-MLC',
        transformers: null,
        availability: 'webllm',
      },
      // Gemma 3 (Google 2025)
      'gemma3-1b': {
        name: 'Gemma 3 1B Instruct',
        webllm: 'gemma-3-1b-it-q4f16_1-MLC',
        // Use ONNX-GQA version which is compatible with Transformers.js
        transformers: 'onnx-community/gemma-3-1b-it-ONNX-GQA',
        transformersDtype: 'q4',
        availability: 'both',
      },
      'gemma3-4b': {
        name: 'Gemma 3 4B Instruct',
        webllm: 'gemma-3-4b-it-q4f16_1-MLC',
        transformers: null,
        availability: 'webllm',
      },
      // Llama 3.2
      'llama-3.2-1b': {
        name: 'Llama 3.2 1B Instruct',
        webllm: 'Llama-3.2-1B-Instruct-q4f16_1-MLC',
        transformers: 'onnx-community/Llama-3.2-1B-Instruct-ONNX',
        transformersDtype: 'q4',
        availability: 'both',
      },
      'llama-3.2-3b': {
        name: 'Llama 3.2 3B Instruct',
        webllm: 'Llama-3.2-3B-Instruct-q4f16_1-MLC',
        transformers: null,
        availability: 'webllm',
      },
      // Small & Fast
      'smollm2-360m': {
        name: 'SmolLM2 360M Instruct',
        webllm: 'SmolLM2-360M-Instruct-q4f16_1-MLC',
        transformers: 'HuggingFaceTB/SmolLM2-360M-Instruct',
        transformersDtype: 'q4',
        availability: 'both',
      },
      'qwen-2.5-0.5b': {
        name: 'Qwen 2.5 0.5B Instruct',
        webllm: 'Qwen2.5-0.5B-Instruct-q4f16_1-MLC',
        transformers: 'onnx-community/Qwen2.5-0.5B-Instruct',
        transformersDtype: 'q4',
        availability: 'both',
      },
      // Medium
      'phi-3.5': {
        name: 'Phi 3.5 Mini 3.8B',
        webllm: 'Phi-3.5-mini-instruct-q4f16_1-MLC',
        transformers: null,
        availability: 'webllm',
      },
    };
    
    function getTests(modelKey) {
      const model = MODELS[modelKey];
      const tests = [];
      
      if (model.webllm) {
        tests.push({
          id: 'webllm-webgpu',
          name: 'WebLLM',
          backend: 'WebGPU (q4f16)',
          icon: '⚡',
          engine: 'webllm',
          model: model.webllm,
          requiresWebGPU: true,
        });
      }
      
      if (model.transformers) {
        tests.push({
          id: 'transformers-webgpu',
          name: 'Transformers.js',
          backend: 'WebGPU (q4)',
          icon: '🤗',
          engine: 'transformers',
          model: model.transformers,
          dtype: model.transformersDtype,
          device: 'webgpu',
          requiresWebGPU: true,
        });
        tests.push({
          id: 'transformers-wasm',
          name: 'Transformers.js',
          backend: 'WASM/CPU (q4)',
          icon: '💻',
          engine: 'transformers',
          model: model.transformers,
          dtype: model.transformersDtype,
          device: null,
          requiresWebGPU: false,
        });
      }
      
      return tests;
    }
    
    const results = {};
    let webgpuAvailable = false;
    
    function log(msg) {
      output.textContent += msg + '\n';
      output.scrollTop = output.scrollHeight;
      console.log(msg);
    }
    
    function setStatus(text, type) {
      globalStatus.textContent = text;
      globalStatus.className = `status ${type}`;
    }
    
    function createResultCard(test) {
      const card = document.createElement('div');
      card.className = 'result-card';
      card.id = `card-${test.id}`;
      card.innerHTML = `
        <h3>
          <span class="icon">${test.icon}</span>
          <span class="engine">${test.name}</span>
          <span class="backend">${test.backend}</span>
        </h3>
        <div class="status pending" id="status-${test.id}">Pending</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-${test.id}"></div></div>
        <div id="metrics-${test.id}" style="margin-top:10px;"></div>
      `;
      return card;
    }
    
    function updateCardStatus(id, status, type) {
      const el = document.getElementById(`status-${id}`);
      if (el) { el.textContent = status; el.className = `status ${type}`; }
    }
    
    function updateProgress(id, percent) {
      const el = document.getElementById(`progress-${id}`);
      if (el) el.style.width = `${percent}%`;
    }
    
    function showMetrics(id, metrics) {
      const container = document.getElementById(`metrics-${id}`);
      if (!container) return;
      container.innerHTML = Object.entries(metrics).map(([label, value]) => `
        <div class="metric">
          <span class="metric-label">${label}</span>
          <span class="metric-value ${label === 'Tokens/sec' ? 'highlight' : ''}">${value}</span>
        </div>
      `).join('');
    }
    
    async function detectHardware() {
      document.getElementById('hw-cpu').textContent = navigator.hardwareConcurrency || '?';
      
      const canvas = document.createElement('canvas');
      const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
      if (gl) {
        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
        let gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : 'WebGL';
        gpu = gpu.replace(/ANGLE \([^,]+, /, '').replace(/ANGLE Metal Renderer: /, '').replace(/, Unspecified Version\)/, '').replace(/\)$/, '');
        document.getElementById('hw-gpu').textContent = gpu.length > 40 ? gpu.substring(0, 40) + '...' : gpu;
      }
      
      if ('gpu' in navigator) {
        try {
          const adapter = await navigator.gpu.requestAdapter();
          if (adapter) {
            webgpuAvailable = true;
            document.getElementById('hw-webgpu').textContent = '✅ Available';
          } else {
            document.getElementById('hw-webgpu').textContent = '❌ No adapter';
          }
        } catch (e) {
          document.getElementById('hw-webgpu').textContent = '❌ Error';
        }
      } else {
        document.getElementById('hw-webgpu').textContent = '❌ Not supported';
      }
    }
    
    modelSelect.addEventListener('change', () => {
      const model = MODELS[modelSelect.value];
      const availTag = model.availability === 'both' 
        ? '<span class="tag both">Both Engines</span>'
        : model.availability === 'webllm'
          ? '<span class="tag webllm">WebLLM only</span>'
          : '<span class="tag transformers">Transformers.js only</span>';
      modelInfo.innerHTML = `Selected: <strong>${model.name}</strong> ${availTag}`;
    });
    
    async function benchmarkWebLLM(test, iterations, maxTokens) {
      updateCardStatus(test.id, 'Loading...', 'loading');
      log(`\n[${test.name}] Loading ${test.model}...`);
      
      const { CreateMLCEngine } = await import('https://esm.run/@mlc-ai/web-llm');
      
      const engine = await CreateMLCEngine(test.model, {
        initProgressCallback: (progress) => {
          updateProgress(test.id, Math.round(progress.progress * 100));
        }
      });
      
      log(`[${test.name}] Warming up...`);
      updateCardStatus(test.id, 'Warming up...', 'loading');
      await engine.chat.completions.create({ messages: [{ role: 'user', content: 'Hi' }], max_tokens: 5 });
      
      updateCardStatus(test.id, 'Benchmarking...', 'loading');
      const runs = [];
      
      for (let i = 0; i < iterations; i++) {
        updateProgress(test.id, ((i + 1) / iterations) * 100);
        const start = performance.now();
        const response = await engine.chat.completions.create({
          messages: [{ role: 'user', content: 'Explain quantum computing in one sentence.' }],
          max_tokens: maxTokens,
          temperature: 0.7,
        });
        const timeMs = performance.now() - start;
        const tokens = response.usage?.completion_tokens || Math.ceil((response.choices[0]?.message?.content || '').length / 4);
        runs.push({ timeMs, tokens, tokPerSec: tokens / (timeMs / 1000) });
        log(`  Run ${i + 1}: ${timeMs.toFixed(0)}ms, ${tokens} tok, ${runs[i].tokPerSec.toFixed(1)} tok/s`);
      }
      
      await engine.unload();
      return calcStats(runs);
    }
    
    async function benchmarkTransformers(test, iterations, maxTokens) {
      updateCardStatus(test.id, 'Loading...', 'loading');
      log(`\n[${test.name}/${test.backend}] Loading ${test.model}...`);
      
      const { pipeline, env } = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0');
      env.allowLocalModels = false;
      
      const opts = { progress_callback: (p) => p.progress && updateProgress(test.id, p.progress) };
      if (test.dtype) opts.dtype = test.dtype;
      if (test.device) opts.device = test.device;
      
      let generator;
      try {
        generator = await pipeline('text-generation', test.model, opts);
      } catch (e) {
        log(`  Error with ${test.device || 'auto'}: ${e.message}`);
        if (test.device) {
          log(`  Retrying without WebGPU...`);
          delete opts.device;
          generator = await pipeline('text-generation', test.model, opts);
        } else throw e;
      }
      
      log(`[${test.name}/${test.backend}] Warming up...`);
      updateCardStatus(test.id, 'Warming up...', 'loading');
      await generator('Hi', { max_new_tokens: 5 });
      
      updateCardStatus(test.id, 'Benchmarking...', 'loading');
      const runs = [];
      
      for (let i = 0; i < iterations; i++) {
        updateProgress(test.id, ((i + 1) / iterations) * 100);
        const prompt = 'Explain quantum computing in one sentence:';
        const start = performance.now();
        const result = await generator(prompt, { max_new_tokens: maxTokens, temperature: 0.7, do_sample: true });
        const timeMs = performance.now() - start;
        const content = result[0].generated_text.slice(prompt.length);
        const tokens = Math.ceil(content.length / 4);
        runs.push({ timeMs, tokens, tokPerSec: tokens / (timeMs / 1000) });
        log(`  Run ${i + 1}: ${timeMs.toFixed(0)}ms, ${tokens} tok, ${runs[i].tokPerSec.toFixed(1)} tok/s`);
      }
      
      return calcStats(runs);
    }
    
    function calcStats(runs) {
      const t = runs.map(r => r.tokPerSec);
      return {
        avgTokPerSec: t.reduce((a, b) => a + b, 0) / t.length,
        minTokPerSec: Math.min(...t),
        maxTokPerSec: Math.max(...t),
        avgLatency: runs.map(r => r.timeMs).reduce((a, b) => a + b, 0) / runs.length,
      };
    }
    
    window.runComparison = async function() {
      const iterations = parseInt(document.getElementById('iterations').value) || 3;
      const maxTokens = parseInt(document.getElementById('maxTokens').value) || 50;
      const modelKey = modelSelect.value;
      const tests = getTests(modelKey);
      
      document.getElementById('runBtn').disabled = true;
      setStatus('Running...', 'loading');
      output.textContent = '';
      resultsGrid.innerHTML = '';
      summaryDiv.style.display = 'none';
      Object.keys(results).forEach(k => delete results[k]);
      
      log(`=== LLM Comparison: ${MODELS[modelKey].name} ===`);
      log(`Iterations: ${iterations}, Max Tokens: ${maxTokens}`);
      log(`WebGPU: ${webgpuAvailable ? 'Yes' : 'No'}`);
      
      if (tests.length === 0) {
        log('\n❌ No tests available for this model');
        setStatus('No tests', 'error');
        document.getElementById('runBtn').disabled = false;
        return;
      }
      
      const applicableTests = tests.filter(t => !t.requiresWebGPU || webgpuAvailable);
      applicableTests.forEach(t => resultsGrid.appendChild(createResultCard(t)));
      
      for (const test of applicableTests) {
        try {
          const stats = test.engine === 'webllm' 
            ? await benchmarkWebLLM(test, iterations, maxTokens)
            : await benchmarkTransformers(test, iterations, maxTokens);
          
          results[test.id] = stats;
          updateCardStatus(test.id, '✅ Done', 'success');
          showMetrics(test.id, {
            'Tokens/sec': stats.avgTokPerSec.toFixed(1),
            'Latency': stats.avgLatency.toFixed(0) + 'ms',
            'Range': `${stats.minTokPerSec.toFixed(0)}-${stats.maxTokPerSec.toFixed(0)}`,
          });
        } catch (e) {
          log(`[${test.name}/${test.backend}] ERROR: ${e.message}`);
          updateCardStatus(test.id, '❌ Failed', 'error');
          showMetrics(test.id, { 'Error': e.message.substring(0, 40) + '...' });
        }
      }
      
      const valid = Object.entries(results).filter(([_, v]) => v?.avgTokPerSec > 0);
      if (valid.length > 0) {
        const [winnerId, winnerStats] = valid.reduce((a, b) => a[1].avgTokPerSec > b[1].avgTokPerSec ? a : b);
        document.querySelectorAll('.result-card').forEach(c => c.classList.remove('winner'));
        document.getElementById(`card-${winnerId}`).classList.add('winner');
        
        const winnerTest = tests.find(t => t.id === winnerId);
        summaryDiv.style.display = 'block';
        document.getElementById('summaryStats').innerHTML = `
          <div class="summary-stat"><div class="value">${winnerStats.avgTokPerSec.toFixed(1)}</div><div class="label">tok/s (${winnerTest.name})</div></div>
          <div class="summary-stat"><div class="value">${valid.length}</div><div class="label">backends tested</div></div>
        `;
        
        log('\n=== RANKING ===');
        valid.sort((a, b) => b[1].avgTokPerSec - a[1].avgTokPerSec).forEach(([id, s], i) => {
          const t = tests.find(x => x.id === id);
          log(`${i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉'} ${t.name} (${t.backend}): ${s.avgTokPerSec.toFixed(1)} tok/s`);
        });
      }
      
      setStatus('Done!', 'success');
      document.getElementById('runBtn').disabled = false;
      log('\n✅ Complete!');
    };
    
    detectHardware();
  </script>
</body>
</html>
