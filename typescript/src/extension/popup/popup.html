<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robutler Browser Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      font-size: 14px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid #262626;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .subtitle { color: #737373; font-size: 12px; margin-top: 2px; }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #dc2626;
    }
    .status-dot.connected { background: #16a34a; }
    .content { padding: 16px; }
    .account {
      background: #171717;
      border: 1px solid #262626;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .account .label { font-size: 11px; color: #737373; text-transform: uppercase; letter-spacing: 0.5px; }
    .account .value { font-size: 14px; font-weight: 600; margin-top: 2px; word-break: break-word; }
    .account .hint { font-size: 12px; color: #a3a3a3; margin-top: 6px; line-height: 1.4; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .stat {
      background: #171717;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #262626;
    }
    .stat-label { font-size: 11px; color: #737373; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 16px; font-weight: 600; margin-top: 2px; word-break: break-word; }
    .tasks {
      margin-bottom: 16px;
    }
    .tasks h2 { font-size: 13px; color: #a3a3a3; margin-bottom: 8px; }
    .task {
      padding: 8px 10px;
      background: #171717;
      border-radius: 6px;
      border: 1px solid #262626;
      margin-bottom: 4px;
      font-size: 12px;
    }
    .task .source { color: #3b82f6; font-weight: 500; }
    .task .instruction { color: #d4d4d4; margin-top: 2px; }
    .task .status { font-size: 11px; color: #737373; margin-top: 2px; }
    .actions { display: flex; gap: 8px; margin-top: 8px; }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-danger { background: #dc2626; color: white; }
    .btn-secondary { background: #262626; color: #e5e5e5; }
    .btn-hidden { display: none; }
    .empty { text-align: center; padding: 20px; color: #737373; font-size: 13px; }
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #262626;
      text-align: center;
    }
    .footer a { color: #3b82f6; text-decoration: none; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="status-dot" id="statusDot"></div>
    <div>
      <h1>Robutler Browser Agent</h1>
      <div class="subtitle" id="connectionText">Not connected</div>
    </div>
  </div>
  <div class="content">
    <div class="account">
      <div class="label">Account</div>
      <div class="value" id="accountName">Not logged in</div>
      <div class="hint" id="accountHint">Log in to create and run your browser companion agent.</div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Agent</div>
        <div class="stat-value" id="agentName">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Tasks</div>
        <div class="stat-value" id="taskCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Mode</div>
        <div class="stat-value" id="llmMode">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Uptime</div>
        <div class="stat-value" id="uptime">—</div>
      </div>
    </div>
    <div class="tasks">
      <h2>Recent Tasks</h2>
      <div id="taskList"><div class="empty">No tasks yet</div></div>
    </div>
    <div class="actions">
      <button class="btn-primary" id="loginBtn">Log in with Robutler</button>
      <button class="btn-primary" id="connectBtn">Connect</button>
      <button class="btn-secondary" id="settingsBtn">Settings</button>
    </div>
    <div class="actions">
      <button class="btn-secondary" id="logoutBtn">Log out</button>
    </div>
  </div>
  <div class="footer">
    <a href="#" id="portalLink">Open Portal</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
